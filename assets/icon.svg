<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#06060c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#b44aff"/>
      <stop offset="100%" stop-color="#ff00e5"/>
    </linearGradient>
    <radialGradient id="center" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#b44aff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="300" fill="url(#center)"/>
  <!-- Orbital rings -->
  <ellipse cx="512" cy="512" rx="260" ry="100" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.6" transform="rotate(-20 512 512)"/>
  <ellipse cx="512" cy="512" rx="300" ry="130" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4" transform="rotate(15 512 512)"/>
  <ellipse cx="512" cy="512" rx="340" ry="80" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.3" transform="rotate(-40 512 512)"/>
  <!-- Core star particles -->
  <circle cx="512" cy="512" r="8" fill="#00e5ff" opacity="0.9"/>
  <circle cx="512" cy="512" r="24" fill="#00e5ff" opacity="0.15"/>
  <circle cx="512" cy="512" r="50" fill="#b44aff" opacity="0.06"/>
  <!-- Scattered stars -->
  <circle cx="340" cy="380" r="3" fill="#00e5ff" opacity="0.7"/>
  <circle cx="680" cy="420" r="2.5" fill="#ff00e5" opacity="0.6"/>
  <circle cx="420" cy="650" r="2" fill="#b44aff" opacity="0.5"/>
  <circle cx="620" cy="340" r="3.5" fill="#00e5ff" opacity="0.4"/>
  <circle cx="380" cy="500" r="2" fill="#ff00e5" opacity="0.3"/>
  <circle cx="660" cy="600" r="2.5" fill="#b44aff" opacity="0.5"/>
  <circle cx="480" cy="360" r="1.5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="560" cy="680" r="2" fill="#ff00e5" opacity="0.4"/>
  <!-- S letter -->
  <text x="512" y="545" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="200" fill="url(#glow)" opacity="0.85">S</text>
</svg>
